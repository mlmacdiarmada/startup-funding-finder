<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Funding Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3d;
    --accent: #7b61ff; --accent2: #00d4aa; --accent3: #ff6b6b;
    --text: #e8e8f0; --muted: #6b6b8a; --gold: #f5c842;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }
  .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .blob1 { width: 400px; height: 400px; background: rgba(123,97,255,0.12); top: -100px; right: -100px; }
  .blob2 { width: 300px; height: 300px; background: rgba(0,212,170,0.08); bottom: 100px; left: -80px; }
  .container { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 40px 24px 60px; }
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(123,97,255,0.15); border: 1px solid rgba(123,97,255,0.3);
    border-radius: 20px; padding: 4px 12px; font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
  }
  .tag::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  h1 {
    font-family: 'Syne', sans-serif; font-size: clamp(28px, 5vw, 48px); font-weight: 800;
    line-height: 1.1; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 10px;
  }
  .subtitle { color: var(--muted); font-size: 13px; letter-spacing: 0.02em; margin-bottom: 36px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 28px; }
  .field { margin-bottom: 18px; }
  .field-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; }
  textarea, select, input[type="text"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 13px; padding: 12px 14px; outline: none; transition: border-color 0.2s;
    resize: none; appearance: none; -webkit-appearance: none;
  }
  textarea:focus, select:focus, input:focus { border-color: var(--accent); }
  select option { background: #1a1a26; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 560px) { .grid2 { grid-template-columns: 1fr; } }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .chip {
    cursor: pointer; border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 12px; font-size: 11px; color: var(--muted); transition: all 0.15s; user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: rgba(123,97,255,0.2); border-color: var(--accent); color: var(--accent); }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #5b41df); border: none; border-radius: 10px;
    cursor: pointer; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    color: #fff; letter-spacing: 0.05em; transition: all 0.2s; margin-top: 6px;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(123,97,255,0.35); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .loading { display: none; text-align: center; padding: 48px; }
  .loading.on { display: block; }
  .spinner { width: 36px; height: 36px; margin: 0 auto 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt { color: var(--muted); font-size: 12px; }
  .error-box { display: none; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); border-radius: 12px; padding: 16px; color: var(--accent3); font-size: 12px; text-align: center; }
  .error-box.on { display: block; }
  .results { display: none; }
  .results.on { display: block; }
  .summary { background: rgba(123,97,255,0.07); border: 1px solid rgba(123,97,255,0.2); border-radius: 12px; padding: 18px; margin-bottom: 20px; font-size: 12px; color: var(--muted); line-height: 1.7; }
  .results-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .results-header h2 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
  .badge { background: rgba(0,212,170,0.15); border: 1px solid rgba(0,212,170,0.3); color: var(--accent2); border-radius: 20px; padding: 2px 10px; font-size: 11px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 14px; transition: border-color 0.2s, transform 0.2s; animation: fadeUp 0.4s ease both; }
  .card:hover { border-color: rgba(123,97,255,0.4); transform: translateY(-2px); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .card-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
  .card-type { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
  .tg { background: rgba(245,200,66,0.15); color: var(--gold); border: 1px solid rgba(245,200,66,0.3); }
  .tv { background: rgba(123,97,255,0.15); color: var(--accent); border: 1px solid rgba(123,97,255,0.3); }
  .ta { background: rgba(0,212,170,0.15); color: var(--accent2); border: 1px solid rgba(0,212,170,0.3); }
  .tl { background: rgba(255,107,107,0.15); color: var(--accent3); border: 1px solid rgba(255,107,107,0.3); }
  .tc { background: rgba(200,160,255,0.15); color: #c8a0ff; border: 1px solid rgba(200,160,255,0.3); }
  .card-desc { color: var(--muted); font-size: 12px; line-height: 1.6; margin-bottom: 14px; }
  .meta { display: flex; flex-wrap: wrap; gap: 10px; }
  .pill { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); background: var(--surface2); border-radius: 6px; padding: 4px 10px; }
  .pill strong { color: var(--text); }
  .pill a { color: var(--accent); text-decoration: none; }
  .tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .tag-chip { font-size: 10px; color: var(--muted); background: var(--surface2); border-radius: 4px; padding: 2px 8px; }
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="container">
  <div class="tag">AI-Powered</div>
  <h1>Startup Funding Finder</h1>
  <p class="subtitle">// Grants · VC · Accelerators · Competitions — searched in real time</p>

  <div class="panel">
    <div class="field">
      <label class="field-label">Describe your startup</label>
      <textarea id="desc" rows="3" placeholder="e.g. B2B SaaS for supply chain optimization, pre-seed, 2 founders, based in Pennsylvania..."></textarea>
    </div>
    <div class="grid2">
      <div class="field">
        <label class="field-label">Stage</label>
        <select id="stage">
          <option value="">Any stage</option>
          <option>Idea / Pre-product</option>
          <option>Pre-seed</option>
          <option>Seed</option>
          <option>Series A</option>
          <option>Growth</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">Industry</label>
        <select id="industry">
          <option value="">Any industry</option>
          <option>AI / Machine Learning</option>
          <option>HealthTech / BioTech</option>
          <option>FinTech</option>
          <option>CleanTech / Sustainability</option>
          <option>EdTech</option>
          <option>SaaS / Enterprise</option>
          <option>Consumer Tech</option>
          <option>Hardware / Deep Tech</option>
          <option>AgTech / FoodTech</option>
          <option>Defense / GovTech</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Funding types (select all that apply)</label>
      <div class="chips">
        <div class="chip active" data-type="Grants">🏛️ Grants</div>
        <div class="chip active" data-type="VC / Angel">💼 VC / Angel</div>
        <div class="chip active" data-type="Accelerators">🚀 Accelerators</div>
        <div class="chip active" data-type="Competitions">🏆 Competitions</div>
        <div class="chip" data-type="Government Loans">🏦 Gov Loans</div>
        <div class="chip" data-type="Revenue-Based Financing">📈 Revenue-Based</div>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Location / Region (optional)</label>
      <input type="text" id="location" placeholder="e.g. USA, EU, Pennsylvania, global...">
    </div>
    <button class="btn" id="searchBtn" onclick="doSearch()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Find Funding Opportunities
    </button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-txt">Scanning grants, accelerators & investors...</div>
  </div>
  <div class="error-box" id="errorBox"></div>

  <div class="results" id="results">
    <div class="summary" id="summary"></div>
    <div class="results-header">
      <h2>Funding Opportunities</h2>
      <span class="badge" id="badge"></span>
    </div>
    <div id="cards"></div>
  </div>
</div>

<script>
document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => c.classList.toggle('active')));

function activeTypes() {
  return [...document.querySelectorAll('.chip.active')].map(c => c.dataset.type);
}

function typeClass(t) {
  if (t.includes('Grant')) return 'tg';
  if (t.includes('VC') || t.includes('Angel')) return 'tv';
  if (t.includes('Accelerator')) return 'ta';
  if (t.includes('Loan') || t.includes('Revenue')) return 'tl';
  return 'tc';
}

async function doSearch() {
  const desc = document.getElementById('desc').value.trim();
  if (!desc) { alert('Please describe your startup first.'); return; }
  const stage = document.getElementById('stage').value;
  const industry = document.getElementById('industry').value;
  const location = document.getElementById('location').value.trim();
  const types = activeTypes();

  document.getElementById('loading').classList.add('on');
  document.getElementById('results').classList.remove('on');
  document.getElementById('errorBox').classList.remove('on');
  document.getElementById('searchBtn').disabled = true;

  const prompt = `You are an expert startup funding advisor. A founder needs funding opportunities.

Startup details:
- Description: ${desc}
- Stage: ${stage || 'Not specified'}
- Industry: ${industry || 'Not specified'}
- Location: ${location || 'Global'}
- Funding types wanted: ${types.length ? types.join(', ') : 'All types'}

Search the web for current, real funding opportunities that match this startup. Find 6-10 specific programs, grants, accelerators, VCs, or competitions that are currently accepting applications or actively investing.

Respond ONLY with a valid JSON object — no markdown, no backticks, no preamble:

{
  "summary": "2-3 sentence personalized funding strategy overview",
  "opportunities": [
    {
      "name": "Official program name",
      "type": "Grant|VC / Angel|Accelerator|Competition|Government Loan|Revenue-Based Financing",
      "amount": "Amount or range",
      "deadline": "Deadline or cycle",
      "fit": "Match percentage like 90%",
      "description": "2-3 sentences: what it is and why it fits this specific startup",
      "url": "Official URL",
      "tags": ["tag1", "tag2"]
    }
  ]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 3000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    let text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    const clean = text.replace(/```json|```/g, '').trim();
    let parsed;
    try { parsed = JSON.parse(clean); }
    catch { const m = clean.match(/\{[\s\S]*\}/); parsed = m ? JSON.parse(m[0]) : null; }
    if (!parsed) throw new Error('Could not parse AI response.');
    render(parsed);
  } catch (err) {
    document.getElementById('errorBox').textContent = 'Error: ' + err.message;
    document.getElementById('errorBox').classList.add('on');
  } finally {
    document.getElementById('loading').classList.remove('on');
    document.getElementById('searchBtn').disabled = false;
  }
}

function render(data) {
  const ops = data.opportunities || [];
  document.getElementById('summary').textContent = data.summary || '';
  document.getElementById('badge').textContent = ops.length + ' found';
  const cards = document.getElementById('cards');
  cards.innerHTML = '';
  ops.forEach((op, i) => {
    const d = document.createElement('div');
    d.className = 'card'; d.style.animationDelay = (i * 0.07) + 's';
    d.innerHTML = `
      <div class="card-top">
        <div class="card-name">${op.name || ''}</div>
        <span class="card-type ${typeClass(op.type || '')}">${op.type || ''}</span>
      </div>
      <div class="card-desc">${op.description || ''}</div>
      <div class="meta">
        ${op.amount ? `<div class="pill">💰 <strong>${op.amount}</strong></div>` : ''}
        ${op.deadline ? `<div class="pill">📅 <strong>${op.deadline}</strong></div>` : ''}
        ${op.fit ? `<div class="pill">🎯 <strong>${op.fit} fit</strong></div>` : ''}
        ${op.url ? `<div class="pill"><a href="${op.url}" target="_blank">🔗 Visit →</a></div>` : ''}
      </div>
      ${op.tags && op.tags.length ? `<div class="tags">${op.tags.map(t=>`<span class="tag-chip">${t}</span>`).join('')}</div>` : ''}
    `;
    cards.appendChild(d);
  });
  document.getElementById('results').classList.add('on');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
